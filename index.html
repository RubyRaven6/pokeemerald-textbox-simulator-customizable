<html>
    <head>
        <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
        <link rel="icon" href="favicon.ico" type="image/x-icon">
        <link rel="stylesheet" type="text/css" href="style.css">
        <title>Dynamic Pok&eacute;mon Emerald Textbox Simulator</title>
    </head>
    <body>
        <div id="main-text">
            <textarea></textarea>
        </div>
        <div id="tips">
            <div id="box-width">
                <label for="cars">Choose box width:</label>
                    <select name="widthOptions" id="width-options">
                    <option value="208">208 (default)</option>
                    <option value="200">200</option>
                    <option value="192">192</option>
                    </select>
            </div>
            <h1>Tips</h1>
            <p>You don&rsquo;t need to leave space for the <img src="down_arrow.gif" alt="down arrow"> indicator.</p>
            <p>The phrase <span class="player">{PLAYER}</span> allows enough space for the widest possible player name.</p>
            <p>If you&rsquo;re writing text to fit in a Match Call (Pok&eacute;Nav) textbox, only type up to the start of the <span class="grey">shaded</span> area.</p>
            <p>Font by <a href="https://fontstruct.com/fontstructions/show/1975556/pokemon-emerald-9" target="_blank">aztecwarrior28</a>.
        </div>
    </body>
</html>
